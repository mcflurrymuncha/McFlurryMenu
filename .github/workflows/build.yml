name: Build McFlurryMenu

on:
  push:
    tags:
      - 'v*' 
    branches:
      - main

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' 

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Project
        run: dotnet build --configuration Release --output ./build

      - name: Rename Output to McFlurryMenu
        # This finds any .dll in the build folder and renames it
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path ./build/*.dll | Select-Object -First 1
          if ($dll) {
            Rename-Item -Path $dll.FullName -NewName "McFlurryMenu.dll"
            Write-Host "Renamed $($dll.Name) to McFlurryMenu.dll"
          } else {
            Write-Error "No DLL found in build directory!"
            exit 1
          }

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: McFlurryMenu-Binary
          path: ./build/McFlurryMenu.dll
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./build/McFlurryMenu.dll
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
