name: Build and Release DLL

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.1

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write # Needed to create the release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Change to your project's version if different

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build DLL
        # This compiles the project and puts the DLL in a clean folder named 'out'
        run: dotnet build --configuration Release --output ./out

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Replace 'YourProjectName.dll' with the actual name of your file
          files: ./out/McFlurryMenu.dll
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
